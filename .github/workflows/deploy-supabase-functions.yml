name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-functions-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID" && exit 1)

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6

      - name: Check summarize Edge Function
        run: deno check --config supabase/functions/summarize-article/deno.json supabase/functions/summarize-article/index.ts

      - name: Deploy core Edge Functions
        run: |
          supabase functions deploy validate-feed --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy discover-feed --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy scan-rss --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy summarize-article --project-ref "$SUPABASE_PROJECT_ID"

      - name: Confirm summarize function deployment
        run: supabase functions list --project-ref "$SUPABASE_PROJECT_ID" | grep -q "summarize-article"
