name: Test and Build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6
      - name: Check summarize Edge Function
        run: deno check --config supabase/functions/summarize-article/deno.json supabase/functions/summarize-article/index.ts
