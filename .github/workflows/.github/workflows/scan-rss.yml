name: Scan RSS

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scan-rss-production
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Invoke scan-rss Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

        run: |
          test -n "$SUPABASE_URL" || (echo "Missing SUPABASE_URL" && exit 1)
          test -n "$CRON_SECRET" || (echo "Missing CRON_SECRET" && exit 1)

          curl --fail-with-body --retry 2 --retry-all-errors \
            --max-time 540 \
            -X POST "$SUPABASE_URL/functions/v1/scan-rss" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"all":true}'
